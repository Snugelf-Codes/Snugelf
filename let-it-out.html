<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let It Out | Snugelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'android-dark': '#121212',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-android-dark text-black dark:text-white transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-6 md:p-12">
        <a href="dashboard.html" class="flex items-center gap-2 font-bold text-xl hover:underline">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Dashboard
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-[#4ADE80] rounded-[3rem] p-12 md:p-20 max-w-4xl w-full shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-12 opacity-10 pointer-events-none">
                 <div class="w-64 h-64 border-8 border-white rounded-full"></div>
            </div>

            <h1 class="text-5xl md:text-7xl font-serif font-black text-black mb-8 leading-tight">
                Let it out.<br>What's on your mind?
            </h1>
            <p class="text-xl md:text-2xl text-black/70 mb-12 font-medium">
                Your message will be added to the Gaza rotation card on the dashboard. Keep it respectful.
            </p>

            <form id="gaza-form" class="space-y-8">
                <textarea
                    id="message-input"
                    class="w-full bg-white/20 backdrop-blur-md border-4 border-black/10 rounded-[2rem] p-8 text-3xl font-serif text-black placeholder:text-black/30 focus:outline-none focus:border-black/30 transition-all min-h-[250px]"
                    placeholder="Type your message here..."
                    required
                ></textarea>

                <button
                    type="submit"
                    class="w-full bg-black text-white py-6 rounded-full text-3xl font-black uppercase tracking-[0.2em] hover:bg-gray-900 transition-colors active:scale-95"
                >
                    Send to the World
                </button>
            </form>

            <div id="success-message" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center text-center p-12">
                <div class="text-9xl mb-8">🕊️</div>
                <h2 class="text-5xl font-serif font-black text-white mb-4">Message Sent!</h2>
                <p class="text-xl text-gray-400 mb-12">Redirecting you back...</p>
            </div>
        </div>
    </main>

    <script src="theme.js"></script>
    <script>
        const form = document.getElementById('gaza-form');
        const input = document.getElementById('message-input');
        const success = document.getElementById('success-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            // Save to localStorage
            const messages = JSON.parse(localStorage.getItem('gaza_messages') || "[]");
            messages.push(`"${text}"`);
            localStorage.setItem('gaza_messages', JSON.stringify(messages));

            // Show success and redirect
            success.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        });
    </script>
</body>
</html>
