<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section (Same-to-Same Layout Stack) -->
    <div class="header-area">
        <h1 class="title-main">Snugelf</h1>
        <h2 class="title-sub">Website still under construction</h2>
        <div class="header-bar"></div>
    </div>

    <!-- Main Component Cards Layout Row -->
    <div class="cards-row">
        <div class="card-frame me-card">
            Me
            <div class="badge-node">✋</div>
        </div>

        <div class="card-frame blogs-card">
            Blogs
            <div class="badge-node">✒</div>
        </div>

        <div class="card-frame confession-card">
            Confession box
            <div class="badge-node">💡</div>
        </div>
    </div>

    <!-- Media Sections Column Set -->
    <div class="media-deck">
        
        <!-- Daily Song Section -->
        <div class="media-item">
            <span class="capsule-tag song-tag">Daily Song</span>
            <div class="music-widget-mock"></div>
        </div>

        <!-- Last Cinema Section (Fixed Image Asset Mapping Path) -->
        <div class="media-item">
            <span class="capsule-tag cinema-tag">Last cinema</span>
            <img src="./dashboard.jpg" class="cinema-display-frame" alt="Peaky Blinders Media Capture">
        </div>
        
    </div>

    <!-- Bottom Corner Action Buttons -->
    <div class="thumbs-row">
        <button class="action-circle circle-down">👎</button>
        <button class="action-circle circle-up">👍</button>
    </div>

</body>
</html>
