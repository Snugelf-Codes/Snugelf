<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'android-dark': '#1A1C1E',
                        'android-surface': '#2D2F31',
                        'custom-cyan': '#5CE1E6',
                        'custom-grey': '#464646',
                        'custom-pink': '#FF2E63',
                        'custom-purple': '#5356C7',
                        'custom-green': '#28A745',
                        'spotify-beige': '#FFEEDB',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-android-dark text-black dark:text-gray-200 transition-colors duration-300 min-h-screen font-sans">

    <div class="max-w-[1200px] mx-auto p-12">

        <!-- Header -->
        <header class="flex justify-between items-start mb-16">
            <div class="border-b-[5px] border-custom-purple pb-2 w-[70%]">
                <h1 class="font-serif text-[100px] inline-block leading-[0.8] tracking-tighter dark:text-white">Snugelf</h1>
                <h2 class="font-serif text-[34px] inline-block ml-4 align-baseline dark:text-gray-300">Website still under construction</h2>
            </div>

            <!-- Dark Mode Toggle -->
            <button id="dark-mode-toggle" class="relative w-12 h-12 flex items-center justify-center rounded-full transition-all duration-300 focus:outline-none">
                <div id="toggle-circle" class="absolute inset-0 bg-black rounded-full flex items-center justify-center transition-colors duration-300">
                    <span id="toggle-icon" class="text-white text-xl">
                        <!-- Moon Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                        </svg>
                    </span>
                </div>
            </button>
        </header>

        <!-- Cards Row -->
        <div class="flex gap-10 pl-16 mb-20">
            <!-- Me Card -->
            <div class="relative w-[235px] h-[165px] bg-custom-cyan rounded-2xl flex items-center justify-center text-3xl font-serif text-black hover:scale-105 transition-transform cursor-default">
                Me
                <div class="card-badge">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c-.55 0-1 .45-1 1v8.17l-2.12-2.12-.01-.01c-.38-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l4.83 4.83c.37.37.88.58 1.41.58h4.31c1.1 0 2-.9 2-2v-4.5c0-.55-.45-1-1-1s-1 .45-1 1v1.5h-1V6c0-.55-.45-1-1-1s-1 .45-1 1v4.5h-1V4c0-.55-.45-1-1-1s-1 .45-1 1v6.5h-1V3c0-.55-.45-1-1-1z"/></svg>
                </div>
            </div>

            <!-- Blogs Card -->
            <div class="relative w-[235px] h-[165px] bg-custom-grey rounded-2xl flex items-center justify-center text-3xl font-serif text-white hover:scale-105 transition-transform cursor-default">
                Blogs
                <div class="card-badge">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M7.13 14.41c-.08-.04-.15-.08-.22-.12l-1.34 1.34c-.18.18-.29.43-.3.7-.03.54.4 1 .95.97.26-.01.51-.12.69-.3l1.34-1.34c-.04-.07-.08-.14-.12-.22-.39-.64-.64-1.35-.74-2.09zm10.74-8.28c-.78-.78-2.05-.78-2.83 0l-6.2 6.2c.26.65.66 1.24 1.17 1.75.51.51 1.1 1.91 1.75 2.17l6.2-6.2c.78-.78.78-2.05 0-2.83zm-2.12 4.24l-1.41-1.41.71-.71 1.41 1.41-.71.71z"/></svg>
                </div>
            </div>

            <!-- Confession Box Card -->
            <div class="relative w-[235px] h-[165px] bg-custom-pink rounded-2xl flex items-center justify-center text-3xl font-serif text-black text-center px-4 hover:scale-105 transition-transform cursor-default">
                Confession box
                <div class="card-badge">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c-3.86 0-7 3.14-7 7 0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2 19c0 .55-.45 1-1 1h-2c-.55 0-1-.45-1-1v-1h4v1z"/></svg>
                </div>
            </div>
        </div>

        <!-- Media Layout -->
        <div class="flex flex-col gap-10 pl-[280px]">
            <!-- Spotify Section -->
            <div>
                <span class="inline-block bg-custom-purple text-white px-5 py-1.5 rounded-full font-bold text-sm mb-4">Last updated</span>
                <div class="w-[565px] h-[152px]">
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0YoAVHXeEPPzZxK0xPQqYn?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>

            <!-- Cinema Section -->
            <div>
                <span class="inline-block bg-[#00B4D8] text-black px-5 py-1.5 rounded-full font-bold text-sm mb-4">Last watched</span>
                <div class="w-[366px] h-[248px] rounded-lg overflow-hidden shadow-lg">
                    <img src="peakpeaky.jpg" alt="Last watched" class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <!-- Action Controls -->
        <div class="flex gap-4 mt-12 pl-4">
            <button class="w-14 h-14 bg-custom-pink rounded-full flex items-center justify-center shadow-md hover:opacity-90 transition-opacity">
                <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M10.8 21h-4.3c-1.3 0-2.5-1.1-2.5-2.5v-6.7c0-.7.3-1.3.8-1.8l5.5-5.5c.5-.5 1.3-.5 1.8 0s.5 1.3 0 1.8L10 8.5h8.5c1.4 0 2.5 1.1 2.5 2.5v2.1c0 .4-.1.8-.3 1.1l-3.4 6.8c-.5.8-1.3 1.5-2.3 1.5l-4.2-.5z"/></svg>
            </button>
            <button class="w-14 h-14 bg-custom-green rounded-full flex items-center justify-center shadow-md hover:opacity-90 transition-opacity">
                <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M13.2 3h4.3c1.3 0 2.5 1.1 2.5 2.5v6.7c0 .7-.3 1.3-.8 1.8l-5.5 5.5c-.5.5-1.3.5-1.8 0s-.5-1.3 0-1.8l2.1-2.2H5.5C4.1 13 3 11.9 3 10.5V8.4c0-.4.1-.8.3-1.1l3.4-6.8C7.2.7 8 0 9 0l4.2.5z"/></svg>
            </button>
        </div>

    </div>

    <script src="theme.js"></script>
</body>
</html>
