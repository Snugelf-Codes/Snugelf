<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="canvas-container">

        <h1 class="header-title-main">Snugelf</h1>
        <h2 class="header-title-sub">Website still under construction</h2>
        <div class="header-blue-bar"></div>

        <div class="block-card card-spec-me">
            Me
            <div class="vector-badge">
                <svg viewBox="0 0 24 24"><path d="M12 2c-.55 0-1 .45-1 1v8.17l-2.12-2.12-.01-.01c-.38-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l4.83 4.83c.37.37.88.58 1.41.58h4.31c1.1 0 2-.9 2-2v-4.5c0-.55-.45-1-1-1s-1 .45-1 1v1.5h-1V6c0-.55-.45-1-1-1s-1 .45-1 1v4.5h-1V4c0-.55-.45-1-1-1s-1 .45-1 1v6.5h-1V3c0-.55-.45-1-1-1z"/></svg>
            </div>
        </div>

        <div class="block-card card-spec-blogs">
            Blogs
            <div class="vector-badge">
                <svg viewBox="0 0 24 24"><path d="M7.13 14.41c-.08-.04-.15-.08-.22-.12l-1.34 1.34c-.18.18-.29.43-.3.7-.03.54.4 1 .95.97.26-.01.51-.12.69-.3l1.34-1.34c-.04-.07-.08-.14-.12-.22-.39-.64-.64-1.35-.74-2.09zm10.74-8.28c-.78-.78-2.05-.78-2.83 0l-6.2 6.2c.26.65.66 1.24 1.17 1.75.51.51 1.1 1.91 1.75 2.17l6.2-6.2c.78-.78.78-2.05 0-2.83zm-2.12 4.24l-1.41-1.41.71-.71 1.41 1.41-.71.71z"/></svg>
            </div>
        </div>

        <div class="block-card card-spec-conf">
            Confession box
            <div class="vector-badge">
                <svg viewBox="0 0 24 24"><path d="M12 2c-3.86 0-7 3.14-7 7 0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2 19c0 .55-.45 1-1 1h-2c-.55 0-1-.45-1-1v-1h4v1z"/></svg>
            </div>
        </div>

        <span class="pill-label-node pill-music">Daily Song</span>
        <div class="spotify-box-mock"></div>

        <span class="pill-label-node pill-cinema">Last cinema</span>
        <img src="dashboard.jpg" class="cinema-frame-media" alt="Peaky Blinders Cinematic Frame">

        <div class="action-thumbs-row">
            <button class="action-btn-circle btn-down-spec">
                <svg viewBox="0 0 24 24"><path d="M10.8 21h-4.3c-1.3 0-2.5-1.1-2.5-2.5v-6.7c0-.7.3-1.3.8-1.8l5.5-5.5c.5-.5 1.3-.5 1.8 0s.5 1.3 0 1.8L10 8.5h8.5c1.4 0 2.5 1.1 2.5 2.5v2.1c0 .4-.1.8-.3 1.1l-3.4 6.8c-.5.8-1.3 1.5-2.3 1.5l-4.2-.5z"/></svg>
            </button>
            <button class="action-btn-circle btn-up-spec">
                <svg viewBox="0 0 24 24"><path d="M13.2 3h4.3c1.3 0 2.5 1.1 2.5 2.5v6.7c0 .7-.3 1.3-.8 1.8l-5.5 5.5c-.5.5-1.3.5-1.8 0s-.5-1.3 0-1.8l2.1-2.2H5.5C4.1 13 3 11.9 3 10.5V8.4c0-.4.1-.8.3-1.1l3.4-6.8C7.2.7 8 0 9 0l4.2.5z"/></svg>
            </button>
        </div>

    </div>

</body>
</html>
