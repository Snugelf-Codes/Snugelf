<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="dashboard">

    <!-- Header layout inline fix -->
    <div class="p2-header-container">
        <h1 class="p2-title">Snugelf</h1>
        <h2 class="p2-subtitle">Website still under construction</h2>
    </div>

    <!-- 3 Component Grid Layout Blocks -->
    <div class="p2-grid-container">
        <div class="p2-card me-card">
            Me
            <div class="p2-icon">✋</div>
        </div>

        <div class="p2-card blogs-card">
            Blogs
            <div class="p2-icon">✒</div>
        </div>

        <div class="p2-card confession-card">
            Confession box
            <div class="p2-icon">💡</div>
        </div>
    </div>

    <!-- Media Blocks Container Structure -->
    <div class="media-section">
        
        <!-- Left Section: Song Player Block Container -->
        <div class="player-block">
            <span class="player-label song-label">Daily Song</span>
            <div class="media-placeholder-box">
                🎵 [Spotify Player Embed Code Vault]
            </div>
        </div>

        <!-- Right Section: Peaky Blinders Media Frame -->
        <div class="player-block">
            <span class="player-label cinema-label">Last cinema</span>
            <!-- This renders ONLY your designated dashboard screenshot image layout inside the frame -->
            <img src="dashboard.jpg" class="cinema-img-frame" alt="Peaky Blinders Frame Block">
        </div>
        
    </div>

    <!-- Static Interaction Thumbs -->
    <div class="thumbs-section">
        <button class="thumb-btn down-btn">👎</button>
        <button class="thumb-btn up-btn">👍</button>
    </div>

</body>
</html>
