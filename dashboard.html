<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Frame -->
    <div class="brand-header-wrap">
        <h1 class="brand-main-title">Snugelf</h1>
        <h2 class="brand-sub-title">Website still under construction</h2>
        <div class="brand-divider-line"></div>
    </div>

    <!-- Component Row -->
    <div class="dashboard-cards-container">
        <div class="app-card card-me">
            Me
            <div class="card-badge-overlay">✋</div>
        </div>

        <div class="app-card card-blogs">
            Blogs
            <div class="card-badge-overlay">✒</div>
        </div>

        <div class="app-card card-confession">
            Confession box
            <div class="card-badge-overlay">💡</div>
        </div>
    </div>

    <!-- Media Section Matrix Stack -->
    <div class="media-flex-stack">
        
        <!-- Daily Song Block Layout -->
        <div class="media-group-node">
            <span class="pill-status-label label-music">Daily Song</span>
            <!-- Embedded Mock Canvas Block -->
            <div class="music-box-embed"></div>
        </div>

        <!-- Last Cinema Block Layout (Absolute Direct Image Path Configuration) -->
        <div class="media-group-node">
            <span class="pill-status-label label-cinema">Last cinema</span>
            <!-- Dynamically references your exact root dashboard asset folder location -->
            <img src="dashboard.jpg" class="cinema-box-embed" alt="Peaky Blinders Display Node">
        </div>
        
    </div>

    <!-- Bottom Alignment Action Handles -->
    <div class="footer-thumbs-container">
        <button class="thumb-action-node action-down">👎</button>
        <button class="thumb-action-node action-up">👍</button>
    </div>

</body>
</html>
