<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snugelf's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="dashboard">

    <!-- Page 2 Header Structure (Image_0.png) -->
    <div class="p2-header-container">
        <h1 class="p2-title">Snugelf</h1>
        <h2 class="p2-subtitle">Website still under construction</h2>
    </div>

    <!-- The 3 Grid Cards -->
    <div class="p2-grid-container">
        <!-- Me Card (Blue) with Hand Icon -->
        <div class="p2-card me-card">
            Me
            <div class="p2-icon">✋</div> <!-- Unicode hand icon -->
        </div>

        <!-- Blogs Card (Grey) with Pen Icon -->
        <div class="p2-card blogs-card">
            Blogs
            <div class="p2-icon">✒</div> <!-- Unicode pen icon -->
        </div>

        <!-- Confession Box Card (Red) with Lightbulb Icon -->
        <div class="p2-card confession-card">
            Confession box
            <div class="p2-icon">💡</div> <!-- Unicode lightbulb icon -->
        </div>
    </div>

    <!-- Media Players Section (Spotify and Peaky Blinders) -->
    <div class="media-section">
        
        <!-- Daily Song (We will add CMS/real player later) -->
        <div class="player-container">
            <span class="player-label song-label">Daily Song</span>
            <!-- BRO: This is a placeholder for a functional player. We can embed Spotify later. -->
            <img src="homepage.png" alt="Song Player Placeholder" style="margin-top:10px; max-width: 300px; opacity: 0.5;">
        </div>

        <!-- Last Cinema (Using Peaky Blinders image) -->
        <div class="player-container">
            <span class="player-label cinema-label">Last cinema</span>
            <!-- Displaying the provided image_0.png content -->
            <img src="dashboard.png" alt="Last Cinema Video" style="margin-top:10px; border-radius: 10px;">
        </div>
    </div>

    <!-- Thumbs Up/Down Section -->
    <div class="thumbs-section">
        <!-- Per your request: these buttons are non-clickable on this page -->
        <button class="thumb-btn down-btn">👎</button>
        <button class="thumb-btn up-btn">👍</button>
    </div>

</body>
</html>
