<body id="homepage">

    <div class="p1-navbar">

            Instagram

    <div class="p1-center-content">

    <script>
        document.getElementById('transition-trigger').addEventListener('click', function(e) {
            e.preventDefault(); 
            const targetUrl = this.getAttribute('href');
            
            // Trigger the extreme strobe/shake transition on the main body
            document.body.classList.add('epic-transition-active');

            setTimeout(() => {
                window.location.href = targetUrl;
            }, 600); // Wait exactly 0.6s for animation completion
        });
    </script>

</body>
