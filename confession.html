<!doctype html>
<html lang="en" data-default-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confessions Page</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="config.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body class="confession-page">
    <header class="confess-header">
      <h1>Confessions Page- KIND OF LIKE AN NGL PAGE</h1>
      <button class="bare-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
        <span class="moon-icon" aria-hidden="true"></span>
      </button>
    </header>

    <main class="confess-shell">
      <a class="outline-back" href="dashboard.html">&larr; BACK TO HOME</a>
      <section class="confess-panel">
        <span class="tab tab-blue tilt-tab">ANYNOMOUS!!!</span>
        <h2>Your <span>confession</span><br>goes here</h2>
        <p>Try to make it about me, cuz its NGL :) No names, no records, just static. Only visible to me</p>
        <form action="https://api.web3forms.com/submit" method="post" data-confession-form>
          <input type="hidden" name="access_key" value="8cc3d9ee-e59e-45e6-b423-939175376f7c">
          <input type="hidden" name="subject" value="Snugelf confession">
          <input type="hidden" name="from_name" value="Snugelf Confession Page">
          <label for="confessionText">Write your truth</label>
          <textarea id="confessionText" name="message" placeholder="Why are you so performative? How desperate can a man be?"></textarea>
          <button type="submit">CONFESS &gt;</button>
          <p class="form-status" data-form-status></p>
        </form>
      </section>
    </main>
  </body>
</html>
